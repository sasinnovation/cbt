apiVersion: apps/v1
kind: Deployment
metadata:
  name: cbt-saas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cbt-saas
  template:
    metadata:
      labels:
        app: cbt-saas
    spec:
      containers:
        - name: cbt-app
          image: cbt-saas:latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
