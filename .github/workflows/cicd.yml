name: CBT SaaS CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run build
        run: npm run build

      - name: Run tests (if any)
        run: echo "No tests configured yet"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deployment Ready
        run: echo "CBT SaaS is ready for deployment"
